<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- caguastore mark: four hue tiles on ink, the launcher in miniature.
       Content stays inside the central 80% so the same art works maskable. -->
  <rect width="512" height="512" rx="112" fill="#0b0d12"/>
  <rect x="76" y="76" width="360" height="360" rx="80" fill="#10131b" stroke="#1e2430" stroke-width="4"/>
  <g>
    <rect x="118" y="118" width="130" height="130" rx="36" fill="hsl(350 60% 22%)" stroke="hsl(350 70% 45%)" stroke-width="6"/>
    <rect x="264" y="118" width="130" height="130" rx="36" fill="hsl(150 55% 20%)" stroke="hsl(150 65% 42%)" stroke-width="6"/>
    <rect x="118" y="264" width="130" height="130" rx="36" fill="hsl(45 60% 22%)" stroke="hsl(45 75% 48%)" stroke-width="6"/>
    <rect x="264" y="264" width="130" height="130" rx="36" fill="hsl(210 60% 22%)" stroke="hsl(210 75% 52%)" stroke-width="6"/>
  </g>
  <!-- tiny LEDs, the store's signature liveness dots -->
  <circle cx="370" cy="224" r="14" fill="#4ec07a"/>
  <circle cx="224" cy="370" r="14" fill="#4ec07a"/>
</svg>
